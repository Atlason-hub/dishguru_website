<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DishGuru Screenshot 1</title>
    <style>
      :root {
        --bg: #f7efe7;
        --paper: #fffaf6;
        --ink: #6a2e18;
        --accent: #d86534;
        --accent-soft: #efc8a9;
        --line: #ebd9cb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        font-family: Arial, Helvetica, sans-serif;
      }

      .canvas {
        width: 1242px;
        height: 2688px;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at top right, rgba(255,255,255,0.65), transparent 28%),
          radial-gradient(circle at bottom left, rgba(216,101,52,0.09), transparent 24%),
          var(--bg);
      }

      .blob-left,
      .blob-right {
        position: absolute;
        background: linear-gradient(180deg, #efb98b, #d86534);
        opacity: 0.18;
        filter: blur(2px);
      }

      .blob-left {
        width: 380px;
        height: 720px;
        left: -170px;
        top: 260px;
        border-radius: 55% 45% 60% 40%;
      }

      .blob-right {
        width: 330px;
        height: 840px;
        right: -160px;
        bottom: -120px;
        border-radius: 45% 55% 40% 60%;
      }

      .dots {
        position: absolute;
        width: 110px;
        height: 220px;
        right: 88px;
        top: 120px;
        opacity: 0.45;
        background-image: radial-gradient(var(--accent-soft) 2px, transparent 2px);
        background-size: 18px 18px;
      }

      .corner-line {
        position: absolute;
        border: 5px solid var(--accent);
        width: 200px;
        height: 200px;
        opacity: 0.45;
      }

      .corner-line.left {
        left: 38px;
        bottom: 235px;
        border-right: 0;
        border-top: 0;
        border-radius: 0 0 0 42px;
      }

      .brand {
        width: 100%;
        text-align: center;
        padding-top: 96px;
        position: relative;
        z-index: 1;
      }

      .brand img {
        width: 156px;
        height: 156px;
        border-radius: 38px;
        box-shadow: 0 16px 42px rgba(152, 91, 44, 0.12);
      }

      h1 {
        margin: 62px auto 0;
        width: 88%;
        color: var(--ink);
        font-size: 106px;
        line-height: 1.04;
        letter-spacing: -1px;
        font-weight: 700;
      }

      h1 span {
        color: var(--accent);
      }

      .rule {
        width: 110px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        margin: 34px auto 34px;
      }

      .sub {
        margin: 0 auto;
        width: 70%;
        text-align: center;
        color: var(--ink);
        font-size: 53px;
        line-height: 1.4;
      }

      .phone-wrap {
        width: 920px;
        margin: 88px auto 0;
        background: rgba(255, 255, 255, 0.72);
        border-radius: 56px;
        padding: 28px;
        box-shadow: 0 32px 80px rgba(112, 72, 39, 0.12);
      }

      .phone-wrap img {
        display: block;
        width: 100%;
        border-radius: 38px;
      }

      .leaf {
        position: absolute;
        width: 128px;
        height: 280px;
        left: 40px;
        bottom: 128px;
        opacity: 0.28;
      }

      .leaf::before,
      .leaf::after {
        content: "";
        position: absolute;
        left: 50%;
        width: 58px;
        height: 124px;
        border: 4px solid #d8b197;
        border-radius: 58px 0 58px 0;
        transform-origin: bottom center;
      }

      .leaf::before {
        transform: translateX(-74px) rotate(26deg);
        bottom: 84px;
      }

      .leaf::after {
        transform: translateX(-10px) rotate(-18deg);
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <div class="blob-left"></div>
      <div class="blob-right"></div>
      <div class="dots"></div>
      <div class="corner-line left"></div>
      <div class="leaf"></div>

      <section class="brand">
        <img src="/Users/adiatlas/Documents/Playground/store-assets/icons/DishGuru-app-store-1024-v3.png" alt="DishGuru logo" />
        <h1>רואים את המנה <span>כמו שהיא</span></h1>
        <div class="rule"></div>
        <p class="sub">תמונות אמיתיות מהעובדים בחברה</p>
      </section>

      <section class="phone-wrap">
        <img src="../../../../Downloads/Screenshot_20260423_163203_Expo Go.jpg" alt="DishGuru app screenshot" />
      </section>
    </main>
  </body>
</html>
